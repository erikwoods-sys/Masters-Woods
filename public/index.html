<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a472a;
      color: #fff;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 2px solid #f0c040;
      margin-bottom: 30px;
    }
    h1 {
      color: #f0c040;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .subtitle { color: #90ee90; margin-top: 8px; }
    .last-updated { color: #90ee90; font-size: 0.85em; margin-top: 5px; }
    .teams-container {
      max-width: 600px;
      margin: 0 auto 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .team-card {
      background: rgba(0,0,0,0.4);
      border: 2px solid #f0c040;
      border-radius: 12px;
      overflow: hidden;
    }
    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
    }
    .team-header:active { background: rgba(255,255,255,0.05); }
    .team-name {
      color: #f0c040;
      font-size: 1.3em;
    }
    .team-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .team-score {
      font-size: 1.8em;
      font-weight: bold;
    }
    .chevron {
      color: #f0c040;
      font-size: 1.2em;
      transition: transform 0.3s;
    }
    .chevron.open { transform: rotate(180deg); }
    .score-negative { color: #90ee90; }
    .score-positive { color: #ff6b6b; }
    .score-even { color: #fff; }
    .players-panel {
      display: none;
      border-top: 1px solid rgba(240,192,64,0.4);
      padding: 10px 0;
    }
    .players-panel.open { display: block; }
    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .player-row.counting { background: rgba(240,192,64,0.08); }
    .player-name { font-size: 0.95em; }
    .player-score { font-weight: bold; }
    .player-status { font-size: 0.8em; color: #aaa; }
    .cut { opacity: 0.5; text-decoration: line-through; }
    .counting-label {
      font-size: 0.7em;
      color: #f0c040;
      margin-left: 6px;
    }
    .leaderboard-section {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(0,0,0,0.4);
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 20px;
    }
    .leaderboard-title {
      color: #f0c040;
      font-size: 1.3em;
      text-align: center;
      margin-bottom: 15px;
    }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .pos-1 { color: #f0c040; font-weight: bold; }
    .loading { text-align: center; padding: 50px; color: #90ee90; }
    .error { text-align: center; padding: 50px; color: #ff6b6b; }
  </style>
</head>
<body>
<div class="header">
  <h1>⛳ The Masters 2026</h1>
  <div class="subtitle">Betting Competition Leaderboard</div>
  <div class="last-updated" id="lastUpdated">Loading...</div>
</div>
<div id="app">
  <div class="loading">Loading scores...</div>
</div>
<script>
const TEAMS = {
  'Team Woods': ['Scheffler', 'Conners', 'Im', 'Ortiz', 'Schauffele'],
  'Team Bergsjø': ['Scheffler', 'Hovland', 'Smith', 'Garcia', 'Åberg']
};
const CUT_SCORE = 10;
function formatScore(score) {
  if (score === 999) return 'WD';
  if (score === 0) return 'E';
  if (score > 0) return '+' + score;
  return score.toString();
}
function getScoreClass(score) {
  if (score < 0) return 'score-negative';
  if (score > 0) return 'score-positive';
  return 'score-even';
}
function processPlayerData(espnData) {
  const players = {};
  try {
    const competitions = espnData.events?.[0]?.competitions?.[0]?.competitors || [];
    competitions.forEach(comp => {
      const name = comp.athlete?.displayName || '';
      const lastName = name.split(' ').slice(-1)[0];
      const status = comp.status?.type?.name || '';
      const score = parseInt(comp.score) || 0;
      const madeCut = !status.includes('CUT');
      players[lastName] = {
        fullName: name,
        score: madeCut ? score : CUT_SCORE * 2,
        madeCut,
        withdrawn: status.includes('WD'),
        position: comp.status?.position?.displayName || '-'
      };
      if (players[lastName].withdrawn) players[lastName].score = 999;
    });
  } catch(e) {
    console.error('Error processing player data:', e);
  }
  return players;
}
function calculateTeamScore(teamPlayers, playerData) {
  const scores = teamPlayers.map(name => {
    const player = playerData[name];
    if (!player) return { name, score: 0, found: false };
    return {
      name: player.fullName || name,
      score: player.score,
      madeCut: player.madeCut,
      withdrawn: player.withdrawn,
      position: player.position,
      found: true
    };
  });
  const sorted = [...scores].sort((a, b) => a.score - b.score);
  const counting = sorted.slice(0, 4);
  const total = counting.reduce((sum, p) => sum + p.score, 0);
  return { scores, counting, total };
}
function toggleTeam(id) {
  const panel = document.getElementById('panel-' + id);
  const chevron = document.getElementById('chevron-' + id);
  panel.classList.toggle('open');
  chevron.classList.toggle('open');
}
function renderApp(playerData) {
  const teamResults = Object.entries(TEAMS).map(([teamName, players]) => {
    const result = calculateTeamScore(players, playerData);
    return { teamName, ...result };
  });
  teamResults.sort((a, b) => a.total - b.total);

  let html = '<div class="teams-container">';
  teamResults.forEach((team, idx) => {
    const countingNames = team.counting.map(p => p.name);
    const id = 'team' + idx;
    html += `
      <div class="team-card">
        <div class="team-header" onclick="toggleTeam('${id}')">
          <span class="team-name">${idx + 1}. ${team.teamName}</span>
          <div class="team-right">
            <span class="team-score ${getScoreClass(team.total)}">${formatScore(team.total)}</span>
            <span class="chevron" id="chevron-${id}">▼</span>
          </div>
        </div>
        <div class="players-panel" id="panel-${id}">
          ${team.scores.map(p => `
            <div class="player-row ${countingNames.includes(p.name) ? 'counting' : ''} ${p.madeCut === false ? 'cut' : ''}">
              <span class="player-name">${p.name}${countingNames.includes(p.name) ? '<span class="counting-label">★</span>' : ''}</span>
              <span class="player-status">${p.position || '-'}</span>
              <span class="player-score ${getScoreClass(p.score)}">${formatScore(p.score)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('lastUpdated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString();
}
async function fetchScores() {
  try {
    const response = await fetch('/api/scores');
    const data = await response.json();
    const playerData = processPlayerData(data);
    renderApp(playerData);
  } catch(error) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load scores. Retrying...</div>';
    console.error(error);
  }
}
fetchScores();
setInterval(fetchScores, 120000);
</script>
</body>
</html>
