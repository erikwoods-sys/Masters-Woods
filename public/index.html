<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #e8e8e8;
      color: #222;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 16px;
    }
    .header {
      text-align: center;
      padding: 16px 0 12px;
      border-bottom: 2px solid #2d6a3f;
      margin-bottom: 20px;
    }
    .logo {
      width: 90px;
      object-fit: contain;
      margin-bottom: 8px;
    }
    h1 {
      color: #1a472a;
      font-size: 1.1em;
      white-space: nowrap;
    }
    .presented {
      color: #1a472a;
      font-size: 0.95em;
      margin-top: 4px;
      font-weight: bold;
    }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 10px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-label {
      color: #555;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-weight: bold;
      color: #1a472a;
      font-size: 1.1em;
    }
    .last-updated { color: #888; font-size: 0.75em; margin-top: 8px; }
    .teams-container {
      max-width: 600px;
      margin: 0 auto 20px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .team-card { border-bottom: 1px solid #ddd; }
    .team-card:last-child { border-bottom: none; }
    .team-card.leader {
      background: linear-gradient(135deg, #fffbe6 0%, #fff9d6 100%);
      border-left: 4px solid #f0c040;
    }
    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }
    .team-header:active { background: rgba(0,0,0,0.03); }
    .team-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .team-pos {
      color: #999;
      font-size: 0.85em;
      width: 22px;
      font-weight: bold;
    }
    .team-pos.first { color: #b8860b; font-size: 0.95em; }
    .team-name {
      color: #1a472a;
      font-size: 1em;
      font-weight: bold;
    }
    .team-name.first { color: #b8860b; }
    .team-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .team-score {
      font-size: 1.2em;
      font-weight: bold;
    }
    .team-score.first-score { font-size: 1.4em; }
    .chevron {
      color: #999;
      font-size: 0.9em;
      transition: transform 0.3s;
    }
    .chevron.open { transform: rotate(180deg); }
    .score-negative { color: #cc3333; }
    .score-positive { color: #2d6a3f; }
    .score-even { color: #333; }
    .players-panel {
      display: none;
      background: #dde8dd;
      border-top: 1px solid #b0c8b0;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
    }
    .players-panel.open { display: block; }
    .round-header {
      display: flex;
      padding: 6px 16px 6px 20px;
      font-size: 0.7em;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #ccdacc;
    }
    .round-header .rh-name { flex: 1; }
    .round-header .rh-r { width: 36px; text-align: center; }
    .round-header .rh-tot { width: 40px; text-align: right; }
    .player-row {
      display: flex;
      align-items: center;
      padding: 10px 16px 10px 20px;
      border-bottom: 1px solid #ccdacc;
    }
    .player-row:last-child { border-bottom: none; }
    .player-row.counting { background: rgba(255,255,255,0.6); }
    .player-row.counting .player-name {
      color: #1a1a1a;
      font-weight: bold;
    }
    .player-row.not-counting {
      opacity: 0.5;
      filter: blur(0.3px);
    }
    .player-row.not-counting .player-name { color: #666; }
    .player-name { font-size: 0.9em; flex: 1; }
    .mc-badge {
      font-size: 0.7em;
      color: #999;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      padding: 1px 4px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .round-cell {
      width: 36px;
      text-align: center;
      font-size: 0.78em;
      color: #555;
      background: rgba(0,0,0,0.05);
      border-radius: 4px;
      padding: 2px 0;
      margin-right: 4px;
    }
    .player-score {
      width: 40px;
      text-align: right;
      font-weight: bold;
      font-size: 0.9em;
    }
    .cut { opacity: 0.4; text-decoration: line-through; }
    .loading { text-align: center; padding: 50px; color: #666; }
    .error { text-align: center; padding: 50px; color: #cc3333; }
  </style>
</head>
<body>
<div class="header">
  <img class="logo" src="/IMG_3970.png" alt="Masters" onerror="this.style.display='none'"/>
  <h1>Masters 2026 — Betting — SLAM/NRP</h1>
  <div class="presented">Presented by Woods</div>
  <div class="stats-row">
    <div class="stat">
      <span class="stat-label">Teams</span>
      <span class="stat-value">24</span>
    </div>
    <div class="stat">
      <span class="stat-label">Prize Pool</span>
      <span class="stat-value">6 000 kr</span>
    </div>
  </div>
  <div class="last-updated" id="lastUpdated">Loading...</div>
</div>
<div id="app">
  <div class="loading">Loading scores...</div>
</div>
<script>
const TEAMS = {
  'Woods': ['Scheffler', 'Conners', 'Im', 'Ortiz', 'Schauffele'],
  'Bergsjø': ['Scheffler', 'Hovland', 'Smith', 'García', 'Åberg'],
  'Næsheim': ['Scheffler', 'Straka', 'Noren', 'Neergaard-Petersen', 'McIlroy'],
  'Heidenreich': ['Young', 'Conners', 'Woodland', 'Reitan', 'Rose'],
  'Børresen': ['Scheffler', 'Conners', 'English', 'García', 'Åberg'],
  'Korbu': ['Scheffler', 'Koepka', 'Im', 'García', 'Åberg'],
  'Norheim': ['Schauffele', 'Spieth', 'Woodland', 'Greyserman', 'Fitzpatrick'],
  'Grouff': ['Rahm', 'Koepka', 'Griffin', 'Reitan', 'DeChambeau'],
  'Faraasen': ['Rahm', 'Hovland', 'Woodland', 'Reitan', 'Scheffler'],
  'Wroll': ['Åberg', 'Hovland', 'Im', 'Välimäki', 'Schauffele'],
  'Daffinrud': ['Scheffler', 'Hovland', 'Hatton', 'Reitan', 'Åberg'],
  'Sagbakken': ['Scheffler', 'Knapp', 'Clark', 'Li', 'McIlroy'],
  'Haukvik': ['Scheffler', 'Henley', 'Hatton', 'García', 'Åberg'],
  'Holter': ['McIlroy', 'Thomas', 'Hatton', 'Reitan', 'Rose'],
  'Ekjord': ['McIlroy', 'Hovland', 'Penge', 'Reitan', 'Rahm'],
  'Magelssen': ['Åberg', 'Hovland', 'Im', 'Ortiz', 'Rahm'],
  'Øygarden': ['Scheffler', 'Conners', 'Smith', 'García', 'Åberg'],
  'Møller': ['Scheffler', 'Spaun', 'English', 'Reitan', 'DeChambeau'],
  'Forthun': ['Rahm', 'Conners', 'Smith', 'Ortiz', 'DeChambeau'],
  'Baumann': ['Åberg', 'Koepka', 'Im', 'Reitan', 'Reed'],
  'Tollefsen': ['Scheffler', 'Lowry', 'Im', 'García', 'Fitzpatrick'],
  'Berg': ['Rahm', 'Hovland', 'Penge', 'Reitan', 'DeChambeau'],
  'Sverdrup': ['McIlroy', 'Hovland', 'Bradley', 'Reitan', 'Åberg'],
  'Jørgensen': ['Scheffler', 'Conners', 'Im', 'Riley', 'Åberg']
};
const CUT_SCORE = 10;
function formatScore(score) {
  if (score === 999) return 'WD';
  if (score === 0) return 'E';
  if (score > 0) return '+' + score;
  return score.toString();
}
function getScoreClass(score) {
  if (score < 0) return 'score-negative';
  if (score > 0) return 'score-positive';
  return 'score-even';
}
function processPlayerData(espnData) {
  const players = {};
  try {
    const competitions = espnData.events?.[0]?.competitions?.[0]?.competitors || [];
    competitions.forEach(comp => {
      const name = comp.athlete?.displayName || '';
      const lastName = name.split(' ').slice(-1)[0];
      const status = comp.status?.type?.name || '';
      const score = parseInt(comp.score) || 0;
      const madeCut = !status.includes('CUT');
      const rounds = comp.linescores?.map(r => r.displayValue || '-') || [];
      players[lastName] = {
        fullName: name,
        score: madeCut ? score : CUT_SCORE * 2,
        madeCut,
        withdrawn: status.includes('WD'),
        position: comp.status?.position?.displayName || '-',
        rounds
      };
      if (players[lastName].withdrawn) players[lastName].score = 999;
    });
  } catch(e) {
    console.error('Error processing player data:', e);
  }
  return players;
}
function calculateTeamScore(teamPlayers, playerData) {
  const scores = teamPlayers.map(name => {
    const player = playerData[name];
    if (!player) return { name, score: 0, found: false, rounds: [] };
    return {
      name: player.fullName || name,
      score: player.score,
      madeCut: player.madeCut,
      withdrawn: player.withdrawn,
      position: player.position,
      rounds: player.rounds,
      found: true
    };
  });
  const sorted = [...scores].sort((a, b) => a.score - b.score);
  const counting = sorted.slice(0, 4);
  const total = counting.reduce((sum, p) => sum + p.score, 0);
  return { scores, counting, total };
}
function toggleTeam(id) {
  const panel = document.getElementById('panel-' + id);
  const chevron = document.getElementById('chevron-' + id);
  panel.classList.toggle('open');
  chevron.classList.toggle('open');
}
function renderApp(playerData) {
  const teamResults = Object.entries(TEAMS).map(([teamName, players]) => {
    const result = calculateTeamScore(players, playerData);
    return { teamName, ...result };
  });
  teamResults.sort((a, b) => a.total - b.total);

  let html = '<div class="teams-container">';
  teamResults.forEach((team, idx) => {
    const countingNames = team.counting.map(p => p.name);
    const id = 'team' + idx;
    const isFirst = idx === 0;
    const maxR = Math.max(...team.scores.map(p => p.rounds?.length || 0), 1);
    const roundHeaders = Array.from({length: maxR}, (_, i) =>
      `<span class="rh-r">R${i+1}</span>`).join('');

    html += `
      <div class="team-card ${isFirst ? 'leader' : ''}">
        <div class="team-header" onclick="toggleTeam('${id}')">
          <div class="team-left">
            <span class="team-pos ${isFirst ? 'first' : ''}">${idx + 1}</span>
            <span class="team-name ${isFirst ? 'first' : ''}">${team.teamName}</span>
          </div>
          <div class="team-right">
            <span class="team-score ${getScoreClass(team.total)} ${isFirst ? 'first-score' : ''}">${formatScore(team.total)}</span>
            <span class="chevron" id="chevron-${id}">▼</span>
          </div>
        </div>
        <div class="players-panel" id="panel-${id}">
          <div class="round-header">
            <span class="rh-name"></span>
            ${roundHeaders}
            <span class="rh-tot">Tot</span>
          </div>
          ${team.scores.map(p => {
            const isCounting = countingNames.includes(p.name);
            const roundCells = Array.from({length: maxR}, (_, i) =>
              `<span class="round-cell">${p.rounds?.[i] || '-'}</span>`).join('');
            const mcBadge = p.madeCut === false ? '<span class="mc-badge">MC</span>' : '';
            return `
            <div class="player-row ${isCounting ? 'counting' : 'not-counting'} ${p.madeCut === false ? 'cut' : ''}">
              <span class="player-name">${p.name}${mcBadge}</span>
              ${roundCells}
              <span class="player-score ${getScoreClass(p.score)}">${formatScore(p.score)}</span>
            </div>
          `}).join('')}
        </div>
      </div>
    `;
  });
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('lastUpdated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString();
}
async function fetchScores() {
  try {
    const response = await fetch('/api/scores');
    const data = await response.json();
    const playerData = processPlayerData(data);
    renderApp(playerData);
  } catch(error) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load scores. Retrying...</div>';
    console.error(error);
  }
}
fetchScores();
setInterval(fetchScores, 120000);
</script>
</body>
</html>
